<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>justmd</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: #ffffff;
        color: #24292f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0d1117; color: #c9d1d9; }
      }
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 10000;
        transition: opacity 0.35s ease;
      }
      #app-loading.hidden { opacity: 0; pointer-events: none; }
      .native-spinner {
        width: 28px;
        height: 28px;
        border: 2px solid currentColor;
        border-bottom-color: transparent;
        border-radius: 50%;
        animation: native-spin 0.8s linear infinite;
        opacity: 0.5;
      }
      @keyframes native-spin {
        to { transform: rotate(360deg); }
      }
      .native-loading-text {
        font-size: 13px;
        opacity: 0.5;
        letter-spacing: 0.05em;
      }
      .native-loading-timer {
        font-size: 11px;
        opacity: 0.35;
        font-variant-numeric: tabular-nums;
        min-height: 16px;
      }
    </style>
    <script>
      (function() {
        window.__perf = { html: performance.now() };
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle('dark', isDark);

        const t0 = performance.now();
        const timer = document.getElementById('loading-timer');
        if (timer) {
          setInterval(function() {
            const ms = Math.round(performance.now() - t0);
            timer.textContent = ms >= 1000 ? (ms / 1000).toFixed(1) + 's' : ms + 'ms';
          }, 80);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app-loading">
      <div class="native-spinner"></div>
      <div class="native-loading-text">justmd</div>
      <div class="native-loading-timer" id="loading-timer">0ms</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
